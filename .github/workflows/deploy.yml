name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Deploy to server
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: root
        key: ${{ secrets.SERVER_SSH_KEY }}
        script_stop: true
        script: |
          set -e
          cd /opt/tepliy-dom

          echo "=== Pulling latest code ==="
          git remote set-url origin https://${{ secrets.GH_PAT }}@github.com/LLIaJIoM/-----------------main1-main.git
          git fetch origin main
          git reset --hard origin/main

          echo "=== Installing dependencies ==="
          pip3 install -r requirements.txt --quiet 2>/dev/null || true

          echo "=== Restarting service ==="
          systemctl restart tepliy-dom
          sleep 3

          echo "=== Checking health ==="
          if curl -sf http://127.0.0.1:8000/ > /dev/null 2>&1; then
            echo "✅ Server is healthy"
          else
            echo "⚠️ Server may still be starting..."
          fi

          echo "=== Service status ==="
          systemctl status tepliy-dom --no-pager -l || true
