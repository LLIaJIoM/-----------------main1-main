name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Deploy to server
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: root
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          echo "=== Checking /opt/tepliy-dom ==="
          if [ ! -d /opt/tepliy-dom ]; then
            echo "Directory not found! Cloning..."
            git clone https://github.com/LLIaJIoM/-----------------main1-main.git /opt/tepliy-dom
          fi
          cd /opt/tepliy-dom

          echo "=== Pulling latest code ==="
          git remote set-url origin https://github.com/LLIaJIoM/-----------------main1-main.git
          git fetch origin main
          git reset --hard origin/main

          echo "=== Latest commit ==="
          git log --oneline -1

          echo "=== Installing dependencies ==="
          pip3 install --break-system-packages -r requirements.txt 2>&1 || echo "pip install warning"

          echo "=== Checking config ==="
          if [ -f config.json ]; then echo "config.json exists"; else echo "WARNING: config.json not found"; fi

          echo "=== Stopping everything ==="
          systemctl stop tepliy-dom 2>&1 || true
          sleep 1

          # Kill processes on port 8000
          fuser -k 8000/tcp 2>/dev/null || true
          sleep 1
          fuser -k 8000/tcp 2>/dev/null || true
          sleep 2

          # Verify port is free
          if fuser 8000/tcp 2>/dev/null; then
            echo "Port 8000 still busy, force kill..."
            fuser -k -9 8000/tcp 2>/dev/null || true
            sleep 2
          fi
          echo "Port 8000 is free"

          systemctl reset-failed tepliy-dom 2>/dev/null || true

          echo "=== Testing Python import ==="
          cd /opt/tepliy-dom && python3 -c "from pages import get_page; print('Import OK')" 2>&1 || echo "IMPORT FAILED"

          echo "=== Starting service ==="
          systemctl start tepliy-dom
          sleep 5

          echo "=== Health check ==="
          if curl -sf http://127.0.0.1:8000/ > /dev/null 2>&1; then
            echo "Server is HEALTHY"
          else
            echo "Server NOT responding! Logs:"
            journalctl -u tepliy-dom --no-pager -n 20
          fi

          echo "=== Service status ==="
          systemctl status tepliy-dom --no-pager -l || true
