name: Update Reviews

on:
  schedule:
    # Каждый день в 03:00 UTC (06:00 МСК)
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Ручной запуск через UI GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Scrape reviews on server (Russian IP)
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: root
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /opt/tepliy-dom

          echo "=== Pulling latest scraper ==="
          git fetch origin main
          git reset --hard origin/main

          echo "=== Running review scraper ==="
          python3 scrape_reviews.py

          echo "=== Checking for changes ==="
          if git diff --quiet assets/reviews.json 2>/dev/null; then
            echo "No changes in reviews"
          else
            echo "Reviews updated! Committing..."
            git config user.name "review-bot"
            git config user.email "review-bot@tepliy-dom.online"
            git add assets/reviews.json
            git commit -m "chore: auto-update reviews from Avito $(date +'%Y-%m-%d')"
            git push origin main
            echo "Pushed! Deploy will trigger automatically."

            echo "=== Restarting service ==="
            systemctl restart tepliy-dom
            sleep 3
            if curl -sf http://127.0.0.1:8000/ > /dev/null 2>&1; then
              echo "Server healthy after restart"
            else
              echo "Warning: server may still be starting"
            fi
          fi
